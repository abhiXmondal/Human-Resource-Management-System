<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            overflow-x: hidden;
            padding: 30px;
        }

        body::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            background: rgba(255,255,255,.08);
            border-radius: 50%;
            top: -120px;
            left: -120px;
        }

        body::after {
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(255,255,255,.06);
            border-radius: 50%;
            right: -80px;
            bottom: -100px;
        }

        .container {
            width: 430px;
            background: rgba(255,255,255,.95);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,.25);
            z-index: 10;
        }

        .head {
            text-align: center;
        }

        .head h4 {
            font-size: 32px;
            color: #1d4ed8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .line {
            width: 70px;
            height: 4px;
            background: #2563eb;
            margin: 15px auto 30px;
            border-radius: 20px;
        }

        .middle {
            display: flex;
            flex-direction: column;
        }

        .middle label {
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        .middle input {
            height: 50px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0 15px;
            font-size: 15px;
            transition: .3s;
            outline: none;
            background: #f8fafc;
        }

        .middle input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 12px rgba(37,99,235,.25);
            background: white;
        }

        .check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 22px;
            color: #475569;
            font-size: 14px;
        }

        .check input {
            width: 18px;
            height: 18px;
        }

        .check a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .check a:hover {
            text-decoration: underline;
        }

        .foot {
            margin-top: 25px;
        }

        #submit-btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg,#2563eb,#1d4ed8);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        #submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37,99,235,.35);
        }

        .container p {
            margin-top: 22px;
            text-align: center;
            color: #475569;
        }

        .container p a {
            color: #2563eb;
            font-weight: bold;
            text-decoration: none;
        }

        .container p a:hover {
            text-decoration: underline;
        }

        .right {
            margin-left: 80px;
        }

        .right img {
            width: 520px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px);} 
            50% { transform: translateY(-15px);} 
            100% { transform: translateY(0px);} 
        }

        @media(max-width:1000px){

            body{
                flex-direction:column;
            }

            .right{
                margin-left:0;
                margin-top:40px;
            }

            .right img{
                width:350px;
            }

            .container{
                width:100%;
                max-width:430px;
            }

        }

        @media(max-width:500px){

            .container{
                padding:25px;
            }

            .head h4{
                font-size:28px;
            }

            .right img{
                width:260px;
            }

        }
    </style>

</head>

<body>

    <div class="container">
        <div class="head">
            <h4>login</h4>
        </div>

        <div class="line"></div>

        <form id="login-form">

            <div class="middle">

                <label for="email">Email:</label>
                <input type="email" name="email" id="email"
                    placeholder=" Enter Your Email address" required>

                <label for="password">Password:</label>
                <input type="password" name="password" id="password"
                    placeholder=" Enter Your Password" required>

            </div>

            <div class="check">
                <input type="checkbox" id="c" name="c" required>
                <label for="c">I agree to the
                    <a href="privacy.html">Privacy & Policy</a>.
                </label>
            </div>

            <div class="foot">
                <button type="submit" id="submit-btn">Login</button>
            </div>

        </form>

        <p>
            Don't have an account?
            <a href="signup.html">Sign up</a>
        </p>

    </div>

    <div class="right">
        <img src="./images/signup.png" alt="ss">
    </div>

    <script src="login.js"></script>

</body>

</html>
